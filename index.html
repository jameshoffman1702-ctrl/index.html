<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pod Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c0392b;
    --muted: #8a8070;
    --border: #d4cfc4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 12px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: -0.5px;
    color: var(--ink);
  }

  header p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 12px auto 0;
  }

  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    resize: vertical;
    min-height: 180px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .meta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  button#polish {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s;
  }

  button#polish:active { transform: scale(0.98); }
  button#polish:disabled { background: var(--muted); cursor: not-allowed; }

  .spinner {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .spinner.visible { display: block; }

  .dot-anim::after {
    content: '';
    animation: dots 1.4s infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  #output-section {
    display: none;
  }

  #output-section.visible {
    display: block;
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .output-header span {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: #27ae60; color: #27ae60; }

  #output-content {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    line-height: 1.75;
    font-size: 0.95rem;
  }

  #output-content h1, #output-content h2, #output-content h3 {
    font-family: 'Playfair Display', serif;
    color: var(--ink);
    margin-top: 1.4em;
    margin-bottom: 0.4em;
  }

  #output-content h1 { font-size: 1.4rem; margin-top: 0; }
  #output-content h2 { font-size: 1.15rem; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  #output-content h3 { font-size: 1rem; color: var(--accent); }

  #output-content p { margin-bottom: 0.8em; }

  #output-content ul, #output-content ol {
    padding-left: 20px;
    margin-bottom: 0.8em;
  }

  #output-content li { margin-bottom: 0.3em; }

  #output-content strong { font-weight: 500; }

  #output-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    color: var(--muted);
    font-style: italic;
    margin: 1em 0;
  }

  .error-msg {
    background: #fdf0ef;
    border: 1px solid #f5c6c2;
    border-radius: 8px;
    padding: 14px;
    color: var(--accent);
    font-size: 0.88rem;
    margin-top: 12px;
    display: none;
  }

  .error-msg.visible { display: block; }

  .new-btn {
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    margin-top: 14px;
    transition: all 0.2s;
  }

  .new-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* API Key screen */
  #key-section { display: none; }
  #key-section.visible { display: block; }

  .key-note {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.5;
  }

  .key-note a { color: var(--accent); }

  .key-saved {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .key-saved button {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>

<header>
  <h1>Pod Notes</h1>
  <p>Paste your scrappy notes. Get something worth keeping.</p>
  <div class="divider"></div>
</header>

<!-- API Key setup -->
<div id="key-section">
  <div class="card">
    <label>Anthropic API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-..." style="width:100%;background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;">
    <p class="key-note">Get your key from <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys. It's saved in your browser only — never stored anywhere else.</p>
  </div>
  <button id="polish" onclick="saveKey()">Save & continue ✦</button>
  <div class="error-msg" id="key-error-msg"></div>
</div>

<!-- Input -->
<div id="input-section">
  <div class="key-saved" id="key-saved-bar">
    <span>🔑 API key saved</span>
    <button onclick="changeKey()">Change</button>
  </div>
  <div class="card">
    <div class="meta-row">
      <div>
        <label>Podcast Name</label>
        <input type="text" id="podcast-name" placeholder="e.g. Huberman Lab">
      </div>
      <div>
        <label>Episode / Guest</label>
        <input type="text" id="episode" placeholder="e.g. ep. 42, Dr. Smith">
      </div>
    </div>
    <label>Your Notes</label>
    <textarea id="notes" placeholder="just dump everything here — spelling mistakes, half sentences, shorthand, whatever you typed while listening..."></textarea>
  </div>

  <button id="polish" onclick="polishNotes()">Polish my notes ✦</button>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- Loading -->
<div class="spinner" id="spinner">
  <p style="font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:6px;">Polishing<span class="dot-anim"></span></p>
  <p style="font-size:0.8rem;">Reading your notes, filling in context, tidying up</p>
</div>

<!-- Output -->
<div id="output-section">
  <div class="output-header">
    <span>Polished Notes</span>
    <button class="copy-btn" id="copy-btn" onclick="copyOutput()">Copy</button>
  </div>
  <div id="output-content"></div>
  <button class="new-btn" onclick="resetForm()">← Polish another episode</button>
</div>

<script>
  // On load, go straight to input
  window.onload = function() {
    document.getElementById('input-section').style.display = 'block';
  };

  async function polishNotes() {
    const notes = document.getElementById('notes').value.trim();
    const podcast = document.getElementById('podcast-name').value.trim();
    const episode = document.getElementById('episode').value.trim();
    const errorEl = document.getElementById('error-msg');

    errorEl.classList.remove('visible');

    if (!notes) {
      errorEl.textContent = 'Please paste some notes first.';
      errorEl.classList.add('visible');
      return;
    }

    // Show loading
    document.getElementById('input-section').style.display = 'none';
    document.getElementById('spinner').classList.add('visible');
    document.getElementById('output-section').classList.remove('visible');

    const contextLine = [podcast && `Podcast: ${podcast}`, episode && `Episode/Guest: ${episode}`].filter(Boolean).join(' | ');

    const systemPrompt = `You are an expert podcast notes editor. Your job is to take someone's raw, scrappy, quickly-typed notes from a podcast episode and transform them into polished, well-structured notes that are genuinely useful to read back later.

The person types fast while listening — expect typos, half-sentences, shorthand, phonetically spelled names or terms, and incomplete thoughts. Your job is to:
1. Correct spelling, including proper nouns, scientific terms, names of people/books/concepts
2. Expand shorthand into full sentences
3. Add brief helpful context for concepts, people, or studies mentioned (1-2 sentences max per item — you know a lot, use it to fill gaps)
4. Organise everything into a clean structure

Output format — use markdown with this structure:
- A short ## title line (podcast name + episode/guest if known)
- A **TL;DR** section: 2-3 sentence summary of the episode
- **Key Topics** or thematic sections with ### subheadings
- **Takeaways** or **Action Items** at the end if relevant
- Keep the person's voice and intent — don't add opinions they didn't express
- Don't fabricate specific claims; only add factual context you're confident about

Be warm, readable, and useful — not clinical or robotic.`;

    const userMessage = `${contextLine ? contextLine + '\n\n' : ''}Raw notes:\n${notes}`;

    const apiKey = null; // key is handled by Val Town proxy

    try {
      const response = await fetch('https://jameshoffman1702ctrl--9c291974539311f188baee650bb23af1.web.val.run/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'API error');
      }

      // Extract text from content blocks (may include tool_use blocks)
      const text = data.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');

      document.getElementById('spinner').classList.remove('visible');
      document.getElementById('output-section').classList.add('visible');
      document.getElementById('output-content').innerHTML = renderMarkdown(text);

    } catch (err) {
      document.getElementById('spinner').classList.remove('visible');
      document.getElementById('input-section').style.display = 'block';
      errorEl.textContent = 'Something went wrong: ' + err.message;
      errorEl.classList.add('visible');
    }
  }

  function renderMarkdown(text) {
    return text
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[hbuol])(.+)$/gm, (m) => m.startsWith('<') ? m : `<p>${m}</p>`)
      .replace(/<p><\/p>/g, '')
      .replace(/<ul><ul>/g, '<ul>')
      .replace(/<\/ul><\/ul>/g, '</ul>');
  }

  function copyOutput() {
    const content = document.getElementById('output-content').innerText;
    navigator.clipboard.writeText(content).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function resetForm() {
    document.getElementById('output-section').classList.remove('visible');
    document.getElementById('input-section').style.display = 'block';
    document.getElementById('notes').value = '';
    document.getElementById('podcast-name').value = '';
    document.getElementById('episode').value = '';
  }
</script>
</body>
</html>
